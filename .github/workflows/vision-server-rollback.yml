name: CI/CD Vision-Server — Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull Request Number to rollback to (e.g., 42 or #42)'
        required: true
        type: string

env:
  NODE_VERSION: '20'
  IMAGE_NAME: vision-server

jobs:
  rollback:
    name: ⏪ Rollback to PR #${{ github.event.inputs.pr_number }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get PR Merge Commit SHA
        id: get_sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.inputs.pr_number }}"
          # Clean up input (remove '#' if user typed it)
          PR_NUMBER="${PR_NUMBER//\#/}"
          
          echo "Fetching merge commit for PR #$PR_NUMBER..."
          
          # gh pr view returns the commit SHA of the merge, which matches what was built in the master branch
          COMMIT_SHA=$(gh pr view "$PR_NUMBER" --json mergeCommit -q .mergeCommit.oid)
          
          if [ -z "$COMMIT_SHA" ] || [ "$COMMIT_SHA" == "null" ]; then
            echo "❌ Could not find merge commit for PR #$PR_NUMBER. Make sure the PR was actually merged."
            exit 1
          fi
          
          echo "✅ Found Commit SHA: $COMMIT_SHA"
          echo "COMMIT_SHA=$COMMIT_SHA" >> $GITHUB_ENV

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy Old Image to Cloud Run
        run: |
          IMAGE_URL="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${{ env.COMMIT_SHA }}"
          
          echo "Rolling back to image: $IMAGE_URL"
          
          gcloud run deploy ${{ secrets.VISION_SERVER_SERVICE_NAME }} \
            --image="$IMAGE_URL" \
            --region="${{ secrets.GCP_REGION }}" \
            --platform=managed \
            --allow-unauthenticated \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --port=8080 \
            --set-env-vars="NODE_ENV=production,LOG_LEVEL=info" \
            --timeout=300

      - name: Get Cloud Run service URL
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ secrets.VISION_SERVER_SERVICE_NAME }} \
            --region="${{ secrets.GCP_REGION }}" \
            --format="value(status.url)")
          echo "✅ Rolled back & Deployed to: $SERVICE_URL"
          echo "SERVICE_URL=$SERVICE_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke test deployed service
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ secrets.VISION_SERVER_SERVICE_NAME }} \
            --region="${{ secrets.GCP_REGION }}" \
            --format="value(status.url)")
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed with HTTP $STATUS"
            exit 1
          fi
          echo "✅ Smoke test passed (HTTP $STATUS)"
